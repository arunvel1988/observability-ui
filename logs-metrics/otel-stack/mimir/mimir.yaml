multitenancy_enabled: false


server:
  http_listen_port: 9009
  grpc_listen_port: 9095



common:

  storage:

    backend: s3

    s3:
      endpoint: minio:9000
      access_key_id: admin
      secret_access_key: password123
      insecure: true



blocks_storage:

  backend: s3


  s3:
    bucket_name: mimir-blocks



  tsdb:
    dir: /tmp/mimir/tsdb



compactor:

  data_dir: /tmp/mimir/compactor



distributor:

  ring:

    kvstore:
      store: inmemory



ingester:

  ring:

    replication_factor: 1

    kvstore:
      store: inmemory



store_gateway:

  sharding_ring:

    replication_factor: 1

    kvstore:
      store: inmemory




ruler_storage:

  backend: s3


  s3:
    bucket_name: mimir-ruler




alertmanager_storage:

  backend: s3


  s3:
    bucket_name: mimir-alerts
