server:
  http_listen_port: 9009


common:
  storage:
    backend: s3

    s3:
      endpoint: minio:9000
      access_key_id: admin
      secret_access_key: password123
      insecure: true



blocks_storage:

  backend: s3

  s3:
    bucket_name: mimir-blocks


ruler_storage:

  backend: s3

  s3:
    bucket_name: mimir-ruler


alertmanager_storage:

  backend: s3

  s3:
    bucket_name: mimir-alerts



compactor:

  data_dir: /tmp/mimir-compactor



ingester:

  ring:

    replication_factor: 1



distributor:

  ring:

    kvstore:
      store: inmemory



store_gateway:

  sharding_ring:

    replication_factor: 1
